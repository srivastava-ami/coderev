[file_structure]
severity = "advisory"

# advisory_at matches max_lines: 300 is the limit, and a sub-limit warning at 200
# is stricter than idiomatic Go (200–300 line files are normal). The blocker at
# 300 still holds.
[file_structure.file_length]
max_lines   = 300
advisory_at = 300
remediation = "Split the file by responsibility. Each file should have a single concern."

[file_structure.class_length]
max_lines   = 150
remediation = "Extract related methods into a helper class or composition."
