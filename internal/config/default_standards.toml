# Built-in default standards — embedded in the coderev binary.
# These apply when no code_review_standards.toml is found in the target repo.
# To customise: create code_review_standards.toml in your repo root or at
# ~/.config/coderev/code_review_standards.toml

[meta]
version      = "built-in"
last_updated = "2026-06-23"
applies_to   = ["typescript", "javascript", "go"]

[security]
severity = "blocker"

[security.secrets]
rule = "security.secrets"

[security.supply_chain]
rule   = "security.dependencies"
checks = ["npm_audit", "known_cves"]

[stability]
severity = "blocker"

[stability.error_handling]
rule   = "stability.error_handling"
checks = ["no_empty_catch", "no_swallowed_exceptions"]

[hardcoding]
severity = "blocker"

[hardcoding.environment_values]
rule     = "hardcoding.urls_and_paths"
examples = ["API_URL", "DATABASE_URL", "SECRET_KEY"]

[hardcoding.magic_numbers]
severity    = "advisory"
rule        = "hardcoding.magic_numbers"
exceptions  = [0, 1, 2, 100, 1000]

[type_safety]
severity = "blocker"

[type_safety.no_any]
rule   = "type_safety.no_any"
checks = ["no_any_type", "no_ts_ignore"]

[type_safety.null_safety]
rule   = "type_safety.null_safety"
checks = ["no_non_null_assertion"]

[complexity]
severity = "blocker"

[complexity.cyclomatic]
max_value    = 10
advisory_at  = 7
hard_block_at = 15
remediation  = "Extract branches into named helpers. Each function should do one thing."

[complexity.cognitive]
max_value = 15
tool      = "treesitter"

[complexity.function_length]
max_lines   = 40
advisory_at = 30
remediation = "Split into smaller focused functions."

[complexity.parameter_count]
max_count   = 3
remediation = "Introduce a parameter object or builder."

[complexity.nesting]
max_depth   = 3
remediation = "Invert conditions (early return) or extract inner blocks to helpers."

[complexity.duplication]
rule             = "file_structure.duplication"
threshold_tokens = 25

[file_structure]
severity = "advisory"

[file_structure.file_length]
max_lines   = 300
advisory_at = 200
remediation = "Split the file by responsibility. Each file should have a single concern."

[file_structure.class_length]
max_lines   = 150
remediation = "Extract related methods into a helper class or composition."

[observability]
severity = "blocker"

[observability.logging]
rule             = "observability.logging"
required_fields  = ["correlationId", "level", "message"]
checks           = ["no_console_log"]
forbidden_levels = ["console.log", "console.error", "console.warn"]

[documentation]
severity = "advisory"

[documentation.comment_quality]
rule        = "documentation.comment_quality"
bad_patterns = ["TODO", "FIXME", "HACK", "XXX"]

[documentation.no_comment_tombstones]
rule        = "documentation.no_tombstones"
severity    = "advisory"
description = "Commented-out code is dead weight"
remediation = "Delete it — version control is your history."

[documentation.todo_format]
rule        = "documentation.todo_format"
pattern     = "TODO\\(\\w+\\):"
severity    = "advisory"
remediation = "Format TODOs as TODO(owner): description"

[testing]
severity = "blocker"

[testing.coverage]
lines       = 80
branches    = 80
functions   = 80
statements  = 80
new_code_minimum = 80

[performance]

[performance.database]
severity = "blocker"
checks   = ["no_n_plus_one", "no_select_star"]

[performance.async]
severity = "major"
checks   = ["no_await_in_loop"]

[nx_conventions]
severity = "blocker"

[nx_conventions.boundaries]
rule        = "nx_conventions.boundaries"
description = "Libraries must not import from app-level packages"
tool        = "madge"

[nx_conventions.tags]
rule           = "nx_conventions.tags"
required_axes  = ["scope", "type"]
