# Built-in default tool configuration, embedded in the binary. This is the
# single source of truth for default adapter wiring and for every URL coderev
# needs (tool download templates, SARIF output URLs) — kept in TOML, never as
# hardcoded literals in Go source, so the hardcoding.urls_and_paths rule is
# honoured rather than excepted.

# ── File walk / scan ──────────────────────────────────────────────────────────
[scan]
batch_size = 1000

# ── Native code graph (`coderev graph`) ───────────────────────────────────────
# Output dir for graph.json + graph.html. A coderev-owned dotdir, NOT
# graphify-out/ (that belongs to the separate graphify tool). Relative paths
# resolve against the scanned target.
[graph]
output_dir = ".coderev/graph"

# ── NATIVE TOOLS (built-in, always available; zero external dependencies) ────
# These adapters are written in pure Go and ship with the binary.
# They always work — no installation required. Use these for your quality gate.

[adapters.treesitter]
enabled = true
description = "Built-in: AST parsing via tree-sitter library"
rules = [
  "complexity.*", "file_structure.*", "type_safety.*", "hardcoding.*",
  "documentation.*", "observability.logging", "stability.error_handling",
  "security.secret_fallback_literal",
]

[adapters.depcve]
enabled      = true
description  = "Built-in: Offline CVE matching via cached OSV snapshot"
snapshot_url = ""
rules        = ["security.dependencies"]

[adapters.secrets]
enabled     = true
description = "Built-in: Pattern + entropy-based secret scanning"
rules       = ["security.secrets"]

[adapters.imports]
enabled     = true
description = "Built-in: Circular dependency detection (Tarjan SCC)"
rules       = ["file_structure.circular_deps", "nx_conventions.boundaries"]

# ── EXTERNAL TOOLS (optional subprocess wrappers; graceful skip if binary missing) ──
# These adapters invoke external binaries. They are OFF by default.
# If a binary is not found, the adapter is skipped; core analysis continues.
# Enable only if you want deeper coverage or different tools for specific languages.

[adapters.semgrep]
enabled      = false
binary       = "semgrep"
description  = "External: Wider AST pattern rules. OPTIONAL — enrichment only. Requires: `semgrep` binary"
rules        = ["security.injection.*", "security.auth.*", "security.cryptography"]
download_url = "https://github.com/semgrep/semgrep/releases/download/v%s/semgrep-v%s-ubuntu-16.04.tgz"

[adapters.gitleaks]
enabled      = false
binary       = "gitleaks"
description  = "External: Git history secret scan. OPTIONAL — native/secrets replaces it. Requires: `gitleaks` binary"
rules        = ["security.secrets"]
download_url = "https://github.com/gitleaks/gitleaks/releases/download/v%s/gitleaks_%s_%s_%s.tar.gz"

[adapters.madge]
enabled     = false
binary      = "madge"
description = "External: Node.js dependency graph. OPTIONAL — native/imports replaces it for Go/TS. Requires: `madge` binary (npm)"
rules       = ["file_structure.circular_deps", "nx_conventions.boundaries"]

[adapters.npmaudit]
enabled     = true
binary      = "npm"
description = "External: npm package audit. DEPRECATED — native/depcve replaces it. Requires: `npm` CLI"
rules       = ["security.dependencies"]

[adapters.graphanalyze]
enabled     = false
description = "External: Architecture coupling & hotspot analysis. OPTIONAL. No binary required (embedded)"
fan_in_max  = 20
fan_out_max = 20
rules       = ["architecture.coupling", "architecture.hotspot"]

[adapters.coverage]
enabled     = true
description = "Optional: Code coverage threshold checking. No binary required (embedded)"
threshold   = 80.0

# ── GitHub API ──────────────────────────────────────────────────────────────────
# Base URL for the GitHub REST API. Can be overridden for GHES or testing.
[github]
base_url = "https://api.github.com"

# ── LLM enrichment (optional, off by default) ─────────────────────────────────
# Coderev is LLM-free by default. Enable only if you want optional enrichment
# such as AI-generated remediation suggestions. The provider is configured as a
# local CLI agent ("cli") or an HTTP API ("api"). Never store API keys here;
# use the environment variable named in api_key_env.
[llm]
enabled      = false
provider     = "cli"
cli_command  = "claude -p {prompt}"
api_base_url = "https://api.anthropic.com/v1/messages"
api_key_env  = "ANTHROPIC_API_KEY"
model        = ""

# ── SARIF output URLs (configuration, not hardcoded constants) ────────────────
[sarif]
schema_url      = "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json"
information_uri = "https://github.com/srivastava-ami/coderev"
