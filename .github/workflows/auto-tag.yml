name: Auto-tag and release on merge

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      next_tag: ${{ steps.calc.outputs.next_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version and tag
        id: calc
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [[ -z "$LATEST" ]]; then LATEST="v0.0.0"; fi

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          # Version signal = the commit messages merged since the last tag, PLUS the
          # PR title. Conventional-commit prefixes drive the bump, so versioning is
          # automatic and does not depend on a hand-typed PR title.
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST}..HEAD" --format='%s%n%b')
          else
            COMMITS=$(git log --format='%s%n%b')
          fi
          SIGNAL=$(printf '%s\n%s\n' "$PR_TITLE" "$COMMITS")
          echo "Current tag: $LATEST"
          echo "PR title: $PR_TITLE"

          # MAJOR — a conventional `type!:` / `type(scope)!:` prefix, or an uppercase
          # "BREAKING CHANGE" footer. Case-sensitive and anchored so a prose mention
          # (e.g. "add major bump" in a ci commit) does NOT trigger a major release.
          if echo "$SIGNAL" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
             || echo "$SIGNAL" | grep -qE '^BREAKING[ -]CHANGE:'; then
            NEXT="v$((MAJOR + 1)).0.0"
          # MINOR — any `feat:` / `feat(scope):` commit.
          elif echo "$SIGNAL" | grep -qE '^feat(\([^)]+\))?:'; then
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
          # PATCH — everything else (fix / chore / docs / ci).
          else
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Next tag: $NEXT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT" -m "$NEXT"
          git push origin "$NEXT"
          echo "next_tag=$NEXT" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cc: "clang -arch x86_64"
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.next_tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install linux/arm64 cross-compiler
        if: matrix.cc == 'aarch64-linux-gnu-gcc'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: 1
        run: |
          VERSION="${{ needs.tag.outputs.next_tag }}"
          mkdir -p bin/dist
          go build -ldflags "-X main.version=${VERSION} -s -w" \
            -o "bin/dist/coderev-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/coderev

      - uses: actions/upload-artifact@v5
        with:
          name: coderev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/dist/coderev-*
          retention-days: 1

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.next_tag }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v5
        with:
          path: bin/dist
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          TAG="${{ needs.tag.outputs.next_tag }}"
          VERSION="${TAG#v}"
          cd bin/dist
          sha256sum coderev-* > SHA256SUMS
          echo "version=${VERSION}"                                                           >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum coderev-${TAG}-darwin-arm64 | awk '{print $1}')"  >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum coderev-${TAG}-darwin-amd64 | awk '{print $1}')"  >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum  coderev-${TAG}-linux-arm64  | awk '{print $1}')"  >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum  coderev-${TAG}-linux-amd64  | awk '{print $1}')"  >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.tag.outputs.next_tag }}"
          gh release create "$TAG" bin/dist/* \
            --title "coderev $TAG" \
            --generate-notes

      - name: Push formula to homebrew-tools tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION:        ${{ steps.sha.outputs.version }}
          DARWIN_ARM64:   ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_AMD64:   ${{ steps.sha.outputs.darwin_amd64 }}
          LINUX_ARM64:    ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_AMD64:    ${{ steps.sha.outputs.linux_amd64 }}
        run: |
          TAG="${{ needs.tag.outputs.next_tag }}"
          sed -i \
            -e "s/version \"[^\"]*\"/version \"${VERSION}\"/" \
            -e "s/SHA256_DARWIN_ARM64/${DARWIN_ARM64}/g" \
            -e "s/SHA256_DARWIN_AMD64/${DARWIN_AMD64}/g" \
            -e "s/SHA256_LINUX_ARM64/${LINUX_ARM64}/g"  \
            -e "s/SHA256_LINUX_AMD64/${LINUX_AMD64}/g"  \
            Formula/coderev.rb
          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=yes"
          git clone git@github.com:srivastava-ami/homebrew-tools.git tap
          cp Formula/coderev.rb tap/Formula/coderev.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/coderev.rb
          git diff --staged --quiet && echo "formula unchanged" && exit 0
          git commit -m "coderev ${TAG}"
          git push
