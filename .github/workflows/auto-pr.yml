name: Auto PR (dev → main)

# Pushing to dev is the only push we do. This opens (or reuses) the promotion PR
# dev → main, which then flows through the existing pipeline:
#   code-quality scan-pr  → coderev reviews the diff (inline annotations + comment)
#   auto-merge            → rebase-merges once required checks are green
#   auto-tag (on merge)   → version bump from PR title → tag
#   release / docker      → build + publish the release on the new tag
#
# IMPORTANT: the PR must be created with a PAT or GitHub App token (AUTO_PR_TOKEN),
# NOT the default GITHUB_TOKEN — a GITHUB_TOKEN-created PR does not trigger the
# review/auto-merge workflows above (GitHub blocks that to prevent recursion).

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: open or update dev → main PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update the promotion PR
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::AUTO_PR_TOKEN is not set — skipping. Add a PAT (or GitHub App token) with 'repo' + 'pull_request' scope as the AUTO_PR_TOKEN secret so the auto-PR triggers coderev review + auto-merge."
            exit 0
          fi

          # Nothing to promote if dev has no diff against main.
          if git diff --quiet origin/main..HEAD; then
            echo "dev has no changes vs main — no PR needed."
            exit 0
          fi

          # Reuse an already-open promotion PR (it updates itself on each push).
          existing=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing (dev → main) is already open; it updates automatically on push."
            exit 0
          fi

          # Derive the release bump from the dev commits since the last tag and
          # encode it in the PR title — so versioning is fully automatic (no
          # hand-typed title) and lands correctly whether auto-tag reads the title
          # or the commits.
          LATEST=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -n "$LATEST" ] && git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST}..HEAD" --format='%s%n%b')
          else
            COMMITS=$(git log --format='%s%n%b')
          fi
          if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]+\))?!:' || echo "$COMMITS" | grep -qE '^BREAKING[ -]CHANGE:'; then
            TITLE="Promote dev → main — breaking change release"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]+\))?:'; then
            TITLE="Promote dev → main — feature release"
          else
            TITLE="Promote dev → main — patch release"
          fi
          echo "Computed title (drives the version bump): $TITLE"

          gh pr create --base main --head dev \
            --title "$TITLE" \
            --body "$(printf 'Automated promotion of **dev** to **main**.\n\n- Reviewed by the latest coderev (see the *coderev scan* check + inline annotations on the diff)\n- Auto-merges (rebase) once required checks pass\n- On merge: auto-tagged and released\n\n**Version bump is automatic** — derived from the dev commit history since the last tag:\n- **major** → a `type!:` commit (e.g. `feat!:`) or `BREAKING CHANGE`\n- **minor** → any `feat:` / `feat(scope):` commit\n- **patch** → everything else (fix / chore / docs / ci)\n\nThe title above is generated to match; no need to edit it.')"
