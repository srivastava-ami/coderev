name: Code Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]    # only PRs targeting main get the full annotation treatment

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  coderev:
    name: coderev scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read          # pull image from GHCR
      pull-requests: write    # post inline PR annotations
      security-events: write  # upload SARIF to Code Scanning tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so --diff origin/<base> works

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build from source with layer cache.
      # After the first release tag this will pull from GHCR instead.
      - name: Build coderev image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: coderev:ci
          cache-from: |
            type=gha
            type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=gha,mode=max

      # ── pull request → diff scan + inline comments + SARIF ──────────────────
      - name: Scan PR (incremental diff + annotate)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -e GH_TOKEN \
            coderev:ci \
              --diff "origin/${BASE_REF}" \
              --annotate-pr \
              --repo "${PR_REPO}" \
              --pr "${PR_NUMBER}" \
              --format sarif \
              /src
          # sarif format: still posts inline comments via --annotate-pr,
          # and writes coderev-report.sarif for the Code Scanning upload below.

      - name: Upload SARIF to GitHub Code Scanning
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: coderev-report.sarif

      # ── push to main → full scan (no annotation, just report artifact) ──────
      - name: Scan main (full)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            coderev:ci /src

      # ── push to any other branch → incremental diff (no annotation) ─────────
      - name: Scan branch (incremental diff)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            coderev:ci --diff HEAD~1 /src

      # ── always upload the report as a workflow artifact ──────────────────────
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coderev-report
          path: |
            coderev-report.md
            coderev-report.sarif
          if-no-files-found: ignore
          retention-days: 30
