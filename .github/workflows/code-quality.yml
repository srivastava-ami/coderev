name: Code Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── branch push: native Go build, no Docker, fastest feedback ────────────────
  scan-branch:
    name: coderev scan (branch)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2        # HEAD~1 is enough for diff

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true           # caches module download + build cache

      - name: Build coderev
        run: mkdir -p .tmp && go build -o /tmp/coderev ./cmd/coderev > .tmp/build.log 2>&1; echo "build exit $?"

      - name: Scan diff
        run: mkdir -p .tmp && /tmp/coderev --diff HEAD~1 . > .tmp/scan.log 2>&1; grep -E "status:|blocker" .tmp/scan.log | tail -2

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coderev-report-branch
          path: coderev-report.md
          if-no-files-found: ignore
          retention-days: 7

  # ── PR and main push: Docker with all adapters, push image to GHCR ──────────
  scan-full:
    name: coderev scan
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # push image to GHCR after build
      pull-requests: write      # post inline PR annotations
      security-events: write    # upload SARIF to Code Scanning

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull from GHCR if available, fall back to GHA cache, fall back to full build.
      # After the first run this step is mostly a fast pull.
      - name: Build and push coderev image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:ci-latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:ci-latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Scan PR (diff + annotate + SARIF)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -e GH_TOKEN \
            ${{ env.IMAGE }}:ci-latest \
              --diff "origin/${BASE_REF}" \
              --annotate-pr \
              --repo "${PR_REPO}" \
              --pr "${PR_NUMBER}" \
              --format sarif \
              /src > .tmp/scan.log 2>&1
          grep -E "status:|blocker" .tmp/scan.log | tail -2

      - name: Upload SARIF
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: coderev-report.sarif

      - name: Scan main (full)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            ${{ env.IMAGE }}:ci-latest /src > .tmp/scan.log 2>&1
          grep -E "status:|blocker" .tmp/scan.log | tail -2

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coderev-report
          path: |
            coderev-report.md
            coderev-report.sarif
          if-no-files-found: ignore
          retention-days: 30
