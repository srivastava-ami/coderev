name: Code Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

# ── branch push: full scan → report committed back to branch ─────────────────
jobs:
  scan-branch:
    name: coderev scan (branch)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:ci-latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:ci-latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Full scan
        run: |
          mkdir -p .tmp
          docker run --rm -v "$GITHUB_WORKSPACE:/src" \
            ${{ env.IMAGE }}:ci-latest /src > .tmp/scan.log 2>&1 || true
          grep -E "status:|blocker|findings" .tmp/scan.log | tail -3

      - name: Publish to step summary
        if: always()
        run: cat coderev-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no report generated" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coderev-report-${{ github.ref_name }}-${{ github.sha }}
          path: coderev-report.md
          if-no-files-found: ignore
          retention-days: 14

# ── PR to main: diff scan → inline annotations on changed lines ───────────────
  scan-pr:
    name: coderev scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:ci-latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:ci-latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Scan diff and annotate PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          mkdir -p .tmp
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -e GH_TOKEN \
            ${{ env.IMAGE }}:ci-latest \
              --diff "origin/${BASE_REF}" \
              --annotate-pr \
              --repo "${PR_REPO}" \
              --pr "${PR_NUMBER}" \
              /src > .tmp/scan.log 2>&1 || true
          grep -E "status:|blocker|findings" .tmp/scan.log | tail -3

      - name: Post report as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          REPORT=$(cat coderev-report.md 2>/dev/null || echo "_no report generated_")
          BODY=$(printf '<!-- coderev-scan -->\n%s' "$REPORT")
          gh pr comment "$PR_NUMBER" --repo "$PR_REPO" --body "$BODY" --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --repo "$PR_REPO" --body "$BODY"

      - name: Publish to step summary
        if: always()
        run: cat coderev-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no report generated" >> "$GITHUB_STEP_SUMMARY"

# ── main push: full scan → report committed back to main, image tagged :latest ─
  scan-main:
    name: coderev scan (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag image as latest
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:ci-latest
            ${{ env.IMAGE }}:latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:ci-latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Full scan
        run: |
          mkdir -p .tmp
          docker run --rm -v "$GITHUB_WORKSPACE:/src" \
            ${{ env.IMAGE }}:latest /src > .tmp/scan.log 2>&1 || true
          grep -E "status:|blocker|findings" .tmp/scan.log | tail -3

      - name: Commit report to main
        if: always()
        run: |
          if [ -f coderev-report.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add coderev-report.md
            git diff --staged --quiet || git commit -m "Update coderev scan report [skip ci]"
            git push
          fi

      - name: Publish to step summary
        if: always()
        run: cat coderev-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no report generated" >> "$GITHUB_STEP_SUMMARY"
