# ─────────────────────────────────────────────────────────────────────────────
# Code Review Standards — Professional Services Edition
# Version  : 2.0.0
# Priority : Security > Stability > Quality > Performance
# ─────────────────────────────────────────────────────────────────────────────
#
# Severity ladder
#   blocker     → CI gate hard-fails; merge is physically blocked
#   major       → Must fix before merge; reviewer can override with written justification
#   advisory    → Must fix or provide written justification in PR thread
#   info        → Learning note; no action required
#
# ─────────────────────────────────────────────────────────────────────────────

[meta]
version              = "2.1.0"
last_updated         = "2026-06-23"
applies_to           = ["nx-monorepo", "standalone-apps", "libs", "infra-as-code"]
priority_order       = ["security", "stability", "quality", "performance"]

# ── Automated enforcement ────────────────────────────────────────────────────
# Rules below are machine-enforced by coderev (https://github.com/srivastava-ami/coderev).
# Sections marked with rule = "pillar.rule_id" are live-gated — CI fails on violations.
#
# Output formats supported:
#   --format markdown (default) — interactive MD with <details>, Mermaid, reliability ratings
#   --format html               — self-contained HTML report
#   --format sarif              — SARIF 2.1.0 for GitHub Code Scanning ingestion
#
# Incremental mode: --diff HEAD~1   (only analyse changed files)
# Baseline trend:   --update-baseline  (save snapshot; future runs show delta)
# PR annotation:    --annotate-pr <N> --repo owner/repo  (inline GitHub review comments)
#
# Every finding is tagged with OWASP category and CWE ID where applicable.
# A-E reliability ratings per pillar appear in the report header.
# ─────────────────────────────────────────────────────────────────────────────


# ═════════════════════════════════════════════════════════════════════════════
# 1. SECURITY  (every violation blocks merge — no override path)
# ═════════════════════════════════════════════════════════════════════════════

[security]
severity             = "blocker"
requires_dedicated_reviewer = true     # at least one reviewer must be security-designated
description          = "Security flaws are never deferred. No written justification unlocks a merge."

# ── 1.1 Secrets ────────────────────────────────────────────────────────────
[security.secrets]
rule                = "no_hardcoded_secrets"
applies_to          = ["*.ts", "*.js", "*.json", "*.yaml", "*.yml", "*.env*", "*.toml", "*.tf", "*.bicep"]
patterns            = [
"password\\s*=\\s*['\"][^'\"]{4,}['\"]",
"api[_-]?key\\s*=\\s*['\"][^'\"]+['\"]",
"secret\\s*=\\s*['\"][^'\"]{6,}['\"]",
"token\\s*=\\s*['\"][^'\"]+['\"]",
"private[_-]?key\\s*=\\s*['\"][^'\"]+['\"]",
"jdbc:[a-z]+://.*:[^@]+@",
"mongodb\\+srv://[^:]+:[^@]+@",
"BEGIN (RSA|EC|OPENSSH) PRIVATE KEY",
"ghp_[A-Za-z0-9]{36}",            # GitHub PAT pattern
"AKIA[0-9A-Z]{16}",               # AWS access key
]
remediation         = "Secrets manager only: Vault, AWS SSM Parameter Store, Azure Key Vault. Never .env files in repo."
pre_commit_tool     = "git-secrets or trufflehog"

# ── 1.2 Supply Chain ───────────────────────────────────────────────────────
[security.supply_chain]
rule                = "controlled_dependency_ingestion"
checks              = [
"lockfile_committed_and_matches_package_json",
"no_install_from_git_sha_or_unversioned_url",
"only_approved_registries",                   # internal Artifactory / Nexus + npmjs.com
"dependency_versions_are_exact_not_range",    # no ^x.y.z in production deps
"new_third_party_dep_requires_security_review",
]
remediation         = "Pin exact versions in package.json; use private registry mirror for air-gapped envs."

# ── 1.3 Injection ──────────────────────────────────────────────────────────
[security.injection]
rule                = "no_injection_vectors"
checks              = [
"sql_string_concat",
"command_injection_unsanitised_exec",
"xss_unescaped_html_output",
"xxe_xml_entity_expansion_enabled",
"path_traversal_user_controlled_path",
"ssrf_unfenced_http_calls",
"prototype_pollution_object_assign_from_user_input",
"open_redirect_unvalidated_location_header",
"template_injection_server_side",
]

# ── 1.3a Automated security rules (enforced by coderev treesitter adapter) ──
[security.no_eval]
rule                = "security.no_eval"
severity            = "blocker"
applies_to          = ["*.ts", "*.js"]
description         = "eval() and new Function() execute arbitrary code — critical injection vector"
cwe                 = "CWE-95"
owasp               = "A03:2021"
remediation         = "Replace with JSON.parse, a lookup table, or a sandboxed evaluator."

[security.no_inner_html]
rule                = "security.no_inner_html"
severity            = "blocker"
applies_to          = ["*.ts", "*.js"]
description         = "innerHTML assignment is an XSS vector when set from user-controlled data"
cwe                 = "CWE-79"
owasp               = "A03:2021"
remediation         = "Use textContent, createElement+appendChild, or a sanitiser library."

[security.no_weak_crypto]
rule                = "security.no_weak_crypto"
severity            = "blocker"
applies_to          = ["*.ts", "*.js", "*.go", "*.py"]
description         = "MD5, SHA-1 are cryptographically broken — forbidden for security-sensitive operations"
cwe                 = "CWE-327"
owasp               = "A02:2021"
remediation         = "Use SHA-256 or stronger. For passwords: bcrypt or argon2."

[security.no_prototype_pollution]
rule                = "security.no_prototype_pollution"
severity            = "blocker"
applies_to          = ["*.ts", "*.js"]
description         = "Direct __proto__ or constructor manipulation enables prototype pollution attacks"
cwe                 = "CWE-1321"
owasp               = "A03:2021"
remediation         = "Use Object.create(null) for safe maps; validate user-supplied keys."

# ── 1.4 Cryptography ───────────────────────────────────────────────────────
[security.cryptography]
rule                = "approved_algorithms_only"
forbidden           = ["MD5", "SHA1", "DES", "3DES", "RC4", "ECB_mode", "CBC_without_HMAC"]
approved_hashing    = ["SHA-256", "SHA-384", "SHA-512", "bcrypt", "argon2id", "scrypt"]
approved_symmetric  = ["AES-256-GCM", "ChaCha20-Poly1305"]
approved_asymmetric = ["RSA-4096", "ECDSA-P256", "Ed25519"]
min_key_bits        = 256
remediation         = "Use platform crypto libraries; never implement crypto primitives."

# ── 1.5 Authentication & Authorisation ────────────────────────────────────
[security.auth]
rule                = "auth_enforced_at_every_boundary"
checks              = [
"every_route_has_auth_guard_or_explicit_public_annotation",
"jwt_signature_verified_not_decoded_only",
"jwt_expiry_and_issuer_validated",
"rbac_enforced_server_side_never_client",
"session_tokens_httponly_secure_samesite_strict",
"no_wildcard_cors_on_credentialled_endpoints",
"rate_limiting_on_all_auth_endpoints",
"account_lockout_after_n_failed_attempts",
"password_hashed_with_approved_kdf",
]

# ── 1.6 Audit Logging ─────────────────────────────────────────────────────
[security.audit_logging]
rule                = "security_events_must_be_logged"
must_log            = [
"successful_authentication",
"failed_authentication",
"authorisation_denial",
"privilege_escalation",
"data_export_or_bulk_read",
"admin_config_change",
"secret_access",
]
must_not_log        = ["password", "token", "secret", "credit_card", "ssn", "dob", "health_data"]
log_format          = "structured_json"
immutable_sink      = true    # audit logs must write to append-only storage

# ── 1.7 Data Classification ────────────────────────────────────────────────
[security.data_classification]
tiers               = ["public", "internal", "confidential", "restricted"]
rule                = "fields_handling_confidential_or_restricted_are_annotated"
examples_restricted = ["SSN", "payment_card", "health_record", "biometric"]
remediation         = "Annotate with @DataClassification decorator; encryption at rest required for restricted."

# ── 1.8 HTTP Security Headers ──────────────────────────────────────────────
[security.http_headers]
rule                = "security_headers_present_on_all_responses"
required            = [
"Strict-Transport-Security",
"Content-Security-Policy",
"X-Content-Type-Options: nosniff",
"X-Frame-Options: DENY",
"Referrer-Policy: strict-origin-when-cross-origin",
"Permissions-Policy",
]
forbidden           = ["X-Powered-By", "Server"]


# ═════════════════════════════════════════════════════════════════════════════
# 2. STABILITY  (client-facing systems that silently fail are worse than ones
#               that crash loudly — stability is non-negotiable in prod)
# ═════════════════════════════════════════════════════════════════════════════

[stability]
severity             = "blocker"
description          = "Stability flaws cause production incidents. No exceptions for client-facing services."

# ── 2.1 Error Handling ─────────────────────────────────────────────────────
[stability.error_handling]
rule                = "errors_must_be_handled_or_propagated"
checks              = [
"no_empty_catch_blocks",
"no_catch_with_only_console_log",
"errors_typed_not_any",                    # catch (e: unknown), not catch (e: any)
"promise_rejections_always_caught",
"unhandled_rejection_handler_registered_at_bootstrap",
"errors_carry_context_not_just_message",   # include correlationId, operation, inputs
"domain_errors_are_typed_classes_not_strings",
]
remediation         = "Use typed error hierarchies (AppError → DomainError / InfraError). Never swallow."

# ── 2.1a Automated stability rules (enforced by coderev treesitter adapter) ─
[stability.no_throw_literal]
rule                = "stability.no_throw_literal"
severity            = "major"
applies_to          = ["*.ts", "*.js"]
description         = "Throwing a string or number — callers cannot catch by type"
cwe                 = "CWE-390"
remediation         = "Throw new Error('message') or a typed Error subclass."

[stability.no_floating_promise]
rule                = "stability.no_floating_promise"
severity            = "major"
applies_to          = ["*.ts", "*.js"]
description         = "Unhandled promise — rejection is silently swallowed"
cwe                 = "CWE-390"
remediation         = "Add await, return, .catch(), or void if intentionally fire-and-forget."

[stability.no_await_in_loop]
rule                = "stability.no_await_in_loop"
severity            = "major"
applies_to          = ["*.ts", "*.js"]
description         = "await inside a loop serialises async calls — N sequential network round-trips instead of 1"
remediation         = "Collect promises in an array and await Promise.all(promises) outside the loop."

# ── 2.2 External Call Resilience ──────────────────────────────────────────
[stability.resilience]
rule                = "all_external_calls_are_resilient"
checks              = [
"timeout_on_every_http_call",
"timeout_on_every_db_query",
"retry_with_exponential_backoff_and_jitter",
"circuit_breaker_on_downstream_dependencies",
"bulkhead_isolation_per_downstream",       # a slow dep cannot exhaust the thread pool
"fallback_or_graceful_degradation_defined",
]
timeout_defaults    = { http_ms = 5000, db_query_ms = 3000, message_consumer_ms = 30000 }
max_retry_attempts  = 3
remediation         = "Use resilience4j / cockatiel pattern; configure per-client, not globally."

# ── 2.3 Idempotency ────────────────────────────────────────────────────────
[stability.idempotency]
rule                = "mutating_operations_are_idempotent"
checks              = [
"post_endpoints_accept_idempotency_key_header",
"event_consumers_are_idempotent",          # same message processed twice = same outcome
"background_jobs_are_safe_to_retry",
"db_upserts_preferred_over_insert_then_check",
]
remediation         = "Store idempotency keys in cache/db with TTL; deduplicate before processing."

# ── 2.4 Transaction Integrity ──────────────────────────────────────────────
[stability.transactions]
rule                = "data_mutations_are_transactionally_safe"
checks              = [
"multi_table_writes_wrapped_in_explicit_transaction",
"no_business_logic_between_db_calls_in_same_transaction",
"saga_pattern_for_cross_service_mutations",
"compensating_transactions_defined_for_each_step",
"optimistic_locking_for_concurrent_entity_updates",
]

# ── 2.5 Resource Management ────────────────────────────────────────────────
[stability.resource_management]
rule                = "resources_always_released"
checks              = [
"db_connections_returned_to_pool_in_finally",
"file_handles_closed_in_finally",
"http_clients_shared_not_instantiated_per_request",
"connection_pool_size_configured_not_defaulted",
"memory_leaks_checked_for_long_lived_objects",
]

# ── 2.6 Graceful Shutdown ──────────────────────────────────────────────────
[stability.graceful_shutdown]
rule                = "process_shuts_down_gracefully"
checks              = [
"sigterm_handler_registered",
"in_flight_requests_drained_before_exit",
"db_pool_closed_on_shutdown",
"message_consumers_stopped_before_exit",
"max_shutdown_time_bounded_seconds",
]
max_shutdown_time_seconds = 30

# ── 2.7 Health Checks ──────────────────────────────────────────────────────
[stability.health_checks]
rule                = "health_endpoints_present_and_meaningful"
required_endpoints  = ["/health/live", "/health/ready"]
liveness_checks     = ["process_responsive"]
readiness_checks    = ["db_reachable", "cache_reachable", "critical_downstream_reachable"]
remediation         = "Liveness must never include downstream — it causes cascading restarts."


# ═════════════════════════════════════════════════════════════════════════════
# 3. OBSERVABILITY  (you cannot operate what you cannot see)
# ═════════════════════════════════════════════════════════════════════════════

[observability]
severity             = "blocker"
description          = "Every service must be observable from day one. Retro-fitting costs 5x."

# ── 3.1 Structured Logging ─────────────────────────────────────────────────
[observability.logging]
rule                = "all_logs_are_structured_json"
required_fields     = ["timestamp", "level", "service", "version", "correlationId", "traceId", "spanId", "message"]
optional_fields     = ["userId", "tenantId", "operation", "durationMs", "statusCode"]
checks              = [
"no_console_log_in_production_code",
"log_level_is_configurable_at_runtime",
"request_receives_correlationId_at_ingress_and_threads_through",
"outbound_calls_propagate_correlationId_header",
"errors_logged_with_full_stack_trace_and_context",
"no_personally_identifiable_info_in_log_fields",
]
forbidden_levels    = ["console.log", "console.error", "console.warn"]  # use logger abstraction

# ── 3.2 Distributed Tracing ────────────────────────────────────────────────
[observability.tracing]
rule                = "distributed_traces_present_for_all_cross_process_calls"
standard            = "OpenTelemetry"
checks              = [
"trace_context_propagated_via_w3c_traceparent_header",
"db_calls_create_child_spans",
"outbound_http_calls_create_child_spans",
"message_publish_and_consume_create_spans",
"span_attributes_include_operation_name_and_status",
]

# ── 3.3 Metrics ────────────────────────────────────────────────────────────
[observability.metrics]
rule                = "sli_metrics_instrumented"
required_metrics    = [
"http_request_duration_seconds (histogram)",
"http_requests_total (counter, labelled by status_code and route)",
"http_errors_total (counter, labelled by error_type)",
"db_query_duration_seconds (histogram)",
"external_call_duration_seconds (histogram, labelled by target)",
"queue_depth (gauge, for each consumer)",
"active_connections (gauge)",
]
slo_targets         = { p95_latency_ms = 500, p99_latency_ms = 1500, error_rate_percent = 0.1 }

# ── 3.4 Alerting Readiness ─────────────────────────────────────────────────
[observability.alerting]
rule                = "runbook_exists_for_each_alert"
checks              = [
"alert_links_to_runbook_url",
"runbook_includes_triage_steps_and_rollback_command",
"pagerduty_or_opsgenie_routing_defined",
]


# ═════════════════════════════════════════════════════════════════════════════
# 4. NO HARDCODING
# ═════════════════════════════════════════════════════════════════════════════

[hardcoding]
severity             = "blocker"
description          = "Source code must not embed values that vary between environments or over time."

[hardcoding.environment_values]
rule                = "no_env_specific_literals"
examples            = [
"localhost or 127.0.0.1 in non-test code",
"IP addresses",
"port numbers outside config files",
"database / schema / collection names",
"bucket / queue / topic names",
"region identifiers",
"account IDs",
"feature flag key strings inlined",
]
remediation         = "Read from environment variables, config service, or IaC outputs. Validate at startup."

[hardcoding.config_validation]
rule                = "configuration_validated_at_startup"
description         = "Missing or malformed config must crash the process loudly at boot, not silently fail at runtime."
pattern             = "use zod/joi/class-validator schema against process.env at bootstrap"

[hardcoding.magic_numbers]
severity            = "major"
rule                = "name_all_magic_numbers"
exceptions          = [0, 1, -1]
remediation         = "Named constant with unit: MAX_RETRY_COUNT, LOCK_TTL_SECONDS, PAGE_SIZE_DEFAULT."

[hardcoding.urls_and_paths]
rule                = "no_hardcoded_external_urls_or_internal_paths"
remediation         = "Centralise in a config module; inject via DI."


# ═════════════════════════════════════════════════════════════════════════════
# 5. TYPE SAFETY
# ═════════════════════════════════════════════════════════════════════════════

[type_safety]
severity             = "blocker"
description          = "Type unsafety in TypeScript is a design flaw that moves errors to runtime."

[type_safety.typescript_strict]
rule                = "strict_typescript_config"
required_flags      = [
"strict: true",
"noImplicitAny: true",
"strictNullChecks: true",
"noUncheckedIndexedAccess: true",
"exactOptionalPropertyTypes: true",
]

[type_safety.no_any]
rule                = "no_any_in_application_code"
checks              = [
"no_explicit_any_type_annotation",
"no_as_any_cast",
"no_ts_ignore_or_ts_nocheck_without_justification_comment",
"external_api_responses_typed_via_schema_not_any",
]
exceptions          = ["generated code", "test double factories with justification comment"]
remediation         = "Use unknown with type guards; generate types from OpenAPI / GraphQL schemas."

[type_safety.null_safety]
rule                = "null_and_undefined_handled_explicitly"
checks              = [
"no_non_null_assertion_operator_in_prod_code",
"optional_chaining_not_used_as_nullability_suppressor",
"result_type_pattern_for_operations_that_can_fail",
]

# ── 5a Automated type-safety rules (enforced by coderev treesitter adapter) ─
[type_safety.no_non_null_assertion]
rule                = "type_safety.no_non_null_assertion"
severity            = "major"
applies_to          = ["*.ts"]
description         = "Non-null assertion (!) suppresses TypeScript null checks — potential runtime null dereference"
remediation         = "Use optional chaining (?.) with a null check or narrow the type explicitly."

[type_safety.no_force_cast]
rule                = "type_safety.no_force_cast"
severity            = "major"
applies_to          = ["*.ts"]
description         = "Double cast (as unknown as T) defeats the type system entirely"
remediation         = "Use a proper type guard or narrow the type through legitimate means."

[type_safety.boundary_validation]
rule                = "all_external_inputs_validated_and_typed"
description         = "HTTP body, query params, env vars, message payloads, file content — all validated at the boundary."
tools               = ["zod", "class-validator", "joi"]
remediation         = "Parse; do not cast. Fail fast with a 400 / DLQ rather than propagating bad data."


# ═════════════════════════════════════════════════════════════════════════════
# 6. CODE COMPLEXITY & ABSTRACTION
# ═════════════════════════════════════════════════════════════════════════════

[complexity]
severity             = "blocker"
description          = "Complexity is the primary source of defects and the primary cost of maintenance."

[complexity.cyclomatic]
rule                = "cyclomatic_complexity_per_function"
max_value           = 8     # was 10; professional bar is tighter
advisory_at         = 5
hard_block_at       = 12   # absolutely no merge path above this
remediation         = "Extract branches to named helpers; prefer strategy/policy objects over switch trees."

[complexity.cognitive]
rule                = "cognitive_complexity_per_function"
max_value           = 10    # was 15; tighter for readability
tool                = "sonarjs/cognitive-complexity"

[complexity.function_length]
rule                = "function_line_limit"
max_lines           = 30    # was 40; screens are not the unit of correctness
advisory_at         = 20
remediation         = "Each function = one verb acting on one noun."

[complexity.parameter_count]
rule                = "max_function_parameters"
max_count           = 3     # was 4; fourth param is almost always a missing object
remediation         = "Introduce a strongly-typed options object or value object."

[complexity.nesting]
rule                = "max_nesting_depth"
max_depth           = 2     # was 3; guard clauses make depth > 2 unnecessary
remediation         = "Early return; extract inner blocks; use functional pipelines (map/filter/reduce)."

[complexity.abstraction]
rule                = "single_responsibility"
checks              = [
"class_does_not_mix_business_logic_with_persistence",
"controller_delegates_to_service_not_implements",
"service_does_not_know_about_http_layer",
"utility_functions_are_pure_and_side_effect_free",
"no_god_objects",
]

[complexity.duplication]
rule                = "no_copy_paste_duplication"
threshold_tokens    = 30    # was 40; DRY is tighter in professional code
remediation         = "Extract to shared util/service/lib. Three occurrences = mandatory extraction."

# ── 6a Automated complexity rules (enforced by coderev treesitter adapter) ──
[complexity.max_return_count]
rule                = "complexity.max_return_count"
severity            = "advisory"
max_returns         = 4
description         = "Excessive return statements signal missing abstraction or overly procedural logic"
remediation         = "Use a single return with a result variable, or extract branches to named helpers."

[complexity.boolean_param_flag]
rule                = "complexity.boolean_param_flag"
severity            = "advisory"
description         = "Boolean flag parameters make call sites unreadable: foo(true, false, true)"
remediation         = "Replace flag params with two separate functions or an options object."

[complexity.cross_file_duplication]
rule                = "duplication.cross_file"
severity            = "major"
window_tokens       = 25    # minimum token sequence to flag as duplicated
description         = "Token sequence repeated across files — extract to shared module"
remediation         = "Extract the shared logic into a shared utility module."


# ═════════════════════════════════════════════════════════════════════════════
# 7. FILE SIZE & STRUCTURE
# ═════════════════════════════════════════════════════════════════════════════

[file_structure]
severity             = "blocker"
description          = "A file too large to read top-to-bottom without scrolling is a design defect."

[file_structure.file_length]
rule                = "max_lines_per_file"
max_lines           = 250   # was 300
advisory_at         = 150
remediation         = "Split by concern: types.ts, constants.ts, helpers.ts, <feature>.service.ts."

[file_structure.class_length]
rule                = "max_lines_per_class"
max_lines           = 120   # was 150
remediation         = "Decompose via composition; extract sub-services injected via constructor."

[file_structure.barrel_files]
rule                = "barrel_files_export_only"
description         = "index.ts: zero implementation. Re-exports only. Checked by regex in CI."

[file_structure.naming]
rule                = "file_name_matches_primary_export"
pattern             = "kebab-case.type.ts"   # e.g. user-auth.service.ts, order.repository.ts

[file_structure.co_location]
rule                = "test_and_types_co_located"
description         = "*.spec.ts lives beside the file; *.types.ts or types/ lives in the same module."

[file_structure.circular_deps]
rule                = "no_circular_dependencies"
tool                = "madge --circular"
remediation         = "Introduce shared-kernel lib or inversion-of-control boundary."

[file_structure.folder_depth]
rule                = "max_folder_nesting"
max_depth           = 5
description         = "Deep nesting in the file tree mirrors deep coupling in the code."


# ═════════════════════════════════════════════════════════════════════════════
# 8. DOCUMENTATION & COMMENTS
# ═════════════════════════════════════════════════════════════════════════════

[documentation]
severity             = "major"    # was advisory; upgraded because poor docs cost client support time
description          = "Code is read 10x more than it is written. Self-documenting code + sparse WHY-comments."

[documentation.comment_quality]
rule                = "comments_explain_why_not_what"
bad_patterns        = [
"// loop through items",
"// call the service",
"// return the result",
"// increment counter",
"// handle error",
]
remediation         = "Rename identifiers until the comment becomes redundant; then delete the comment."

[documentation.no_comment_tombstones]
rule                = "no_commented_out_code"
severity            = "blocker"
description         = "Commented-out code is a lie — it implies the code may return. Git is the undo stack."

[documentation.required_comments]
rule                = "comment_required_for_non_obvious_why"
mandatory_when      = [
"workaround for upstream bug — must include issue URL",
"algorithm with non-obvious time/space tradeoff — must include reference",
"timing or ordering invariant not captured by the type system",
"intentional deviation from project convention — must include ADR reference",
"known limitation with a future resolution plan — must include ticket",
]

[documentation.public_api]
rule                = "exported_symbols_have_jsdoc"
severity            = "major"
description         = "All exported functions, classes, and types in lib packages require at minimum a one-line JSDoc."

[documentation.todo_format]
rule                = "todos_are_linked_tickets"
pattern             = "TODO\\(#\\d+\\)"
severity            = "major"
remediation         = "Unlinked TODOs are deferred deferrals. Link or delete."

[documentation.adr]
rule                = "architectural_decisions_recorded"
description         = "Any decision that changes a boundary, introduces a dependency, or deviates from convention requires an ADR."
location            = "docs/decisions/"
format              = "MADR (Markdown Architectural Decision Records)"


# ═════════════════════════════════════════════════════════════════════════════
# 9. API CONTRACT
# ═════════════════════════════════════════════════════════════════════════════

[api_contract]
severity             = "blocker"
description          = "Clients depend on API contracts. Breaking them silently is an incident."

[api_contract.versioning]
rule                = "apis_are_versioned_from_day_one"
strategy            = "url_path"          # /v1/users — not header versioning (harder to cache)
checks              = [
"new_endpoints_created_under_versioned_path",
"version_in_openapi_spec_matches_path",
]

[api_contract.breaking_changes]
rule                = "breaking_changes_require_new_version"
breaking_changes    = [
"removing_a_field",
"changing_a_field_type",
"renaming_a_field",
"changing_http_method",
"changing_status_codes_for_existing_scenarios",
"adding_required_request_field",
"removing_an_endpoint",
]
non_breaking        = [
"adding_optional_response_field",
"adding_new_endpoint",
"adding_optional_request_param_with_default",
]

[api_contract.schema_first]
rule                = "openapi_spec_is_source_of_truth"
checks              = [
"spec_committed_alongside_implementation",
"client_types_generated_from_spec_not_handwritten",
"contract_tests_run_against_spec",
]

[api_contract.error_responses]
rule                = "error_responses_follow_rfc_9457_problem_detail"
required_fields     = ["type", "title", "status", "detail", "instance", "traceId"]
description         = "Clients must be able to programmatically distinguish error types."


# ═════════════════════════════════════════════════════════════════════════════
# 10. TESTING
# ═════════════════════════════════════════════════════════════════════════════

[testing]
severity             = "blocker"
description          = "Untested code is unverified intent. Untestable code is a design flaw."

[testing.coverage]
rule                = "testing.coverage"              # enforced by coderev coverage adapter
severity            = "major"
lines               = 80     # gate threshold — files below this emit a finding
branches            = 75
functions           = 80
statements          = 80
new_code_minimum    = 90     # files added in this PR must reach this bar
# Coverage reports auto-discovered: coverage/lcov.info (JS/TS) or coverage.out (Go)
# Override paths in tool_config.toml → [adapters.coverage] lcov_path / gocover_path
remediation         = "Add unit tests for uncovered branches. Focus on error paths first."

[testing.pyramid]
rule                = "test_pyramid_enforced"
description         = "80% unit, 15% integration, 5% e2e. Inverted pyramids are slow and brittle."
checks              = [
"unit_tests_have_no_network_or_disk_io",
"integration_tests_use_real_db_not_mocks",   # mock/prod divergence causes prod-only failures
"e2e_tests_cover_critical_paths_only",
]

[testing.test_quality]
rule                = "no_trivial_or_brittle_tests"
checks              = [
"tests_assert_behaviour_not_implementation_details",
"no_test_depends_on_another_test_order",
"no_sleep_or_arbitrary_timeout",
"mocks_reset_between_tests",
"test_names_describe_scenario_and_expected_outcome",
"no_assertion_in_loop_without_at_least_one_count_check",
"mutation_testing_score_above_70_for_domain_layer",
]

[testing.contract_testing]
rule                = "consumer_driven_contract_tests_for_all_integrations"
tool                = "Pact or similar"
description         = "Both producer and consumer verify the contract independently. No shared test environments."

[testing.performance_testing]
rule                = "load_tests_required_before_first_prod_release"
tool                = "k6 or Artillery"
thresholds          = { p95_ms = 500, p99_ms = 1500, error_rate = 0.001 }


# ═════════════════════════════════════════════════════════════════════════════
# 11. PERFORMANCE  (elevated from advisory to blocker for structural patterns)
# ═════════════════════════════════════════════════════════════════════════════

[performance]
description          = "Structural anti-patterns are blockers; micro-optimisations are advisory."

[performance.database]
severity            = "blocker"   # N+1 is a production incident waiting to happen
checks              = [
"no_n_plus_one_queries",
"pagination_required_on_all_list_endpoints",
"pagination_uses_keyset_not_offset_for_large_tables",
"indexes_defined_for_all_foreign_keys_and_filter_columns",
"no_select_star_in_application_code",
"query_execution_plans_reviewed_for_new_queries_on_tables_over_100k_rows",
"no_schema_migration_that_locks_table_without_zero_downtime_strategy",
]

[performance.async]
severity            = "blocker"
checks              = [
"no_await_inside_loop",                          # use Promise.all or batching
"no_blocking_synchronous_io_on_event_loop",
"observable_subscriptions_unsubscribed_on_destroy",
"no_unbounded_concurrency",                      # always bound with p-limit or semaphore
]

[performance.memory]
severity            = "major"
checks              = [
"no_global_state_that_grows_unbounded",
"large_datasets_streamed_not_loaded_into_memory",
"caches_have_ttl_and_max_size",
"event_listeners_removed_on_cleanup",
]

[performance.bundle]
severity            = "advisory"
checks              = [
"no_full_library_import_when_tree_shakeable",
"lazy_load_routes_over_50kb",
"no_duplicate_deps_in_bundle",
"images_served_via_cdn_not_inline",
]

[performance.caching]
severity            = "major"
checks              = [
"cache_headers_set_correctly_on_static_assets",
"http_responses_include_etag_or_last_modified",
"idempotent_reads_cacheable_at_application_layer",
"cache_invalidation_strategy_documented",
]


# ═════════════════════════════════════════════════════════════════════════════
# 12. DEPLOYMENT READINESS
# ═════════════════════════════════════════════════════════════════════════════

[deployment_readiness]
severity             = "blocker"
description          = "Code that cannot be deployed safely should not be merged."

[deployment_readiness.feature_flags]
rule                = "risky_changes_behind_feature_flag"
risky_changes       = [
"new_user_facing_behaviour",
"changes_to_existing_api_contracts",
"new_infrastructure_dependencies",
"db_schema_migrations_with_application_changes",
]
remediation         = "Use feature flag service; flags include owner, rollout_percent, kill_switch."

[deployment_readiness.db_migrations]
rule                = "migrations_are_backward_compatible"
strategy            = "expand_contract"   # expand (add) → deploy → contract (remove old)
checks              = [
"new_column_is_nullable_or_has_default",
"no_column_rename_in_single_migration",
"no_column_drop_until_code_no_longer_references_it",
"migration_is_idempotent_if_rerun",
"rollback_migration_exists_or_is_documented_as_manual",
]

[deployment_readiness.rollback]
rule                = "every_deploy_has_a_rollback_plan"
checks              = [
"previous_version_can_run_against_new_db_schema",
"rollback_command_documented_in_pr_description",
"feature_flag_can_disable_change_without_redeploy",
]


# ═════════════════════════════════════════════════════════════════════════════
# 13. NX MONOREPO CONVENTIONS
# ═════════════════════════════════════════════════════════════════════════════

[nx_conventions]
severity             = "blocker"
description          = "NX boundaries are the architecture. Violations are structural regressions."

[nx_conventions.boundaries]
rule                = "no_cross_boundary_imports"
description         = "apps import from libs; libs never import from apps; feature libs never import peer feature libs."
tool                = "nx enforce-module-boundaries"

[nx_conventions.tags]
rule                = "every_project_has_tags"
required_axes       = ["scope", "type", "tier"]
# scope:auth, type:feature, tier:domain  /  scope:shared, type:util, tier:infra

[nx_conventions.affected]
rule                = "ci_targets_only_affected_projects"
description         = "nx affected only. nx run-many without --all=false is banned."

[nx_conventions.generators]
rule                = "scaffolding_via_nx_generators_only"
description         = "Manual creation breaks the project graph. Generators are the contract."

[nx_conventions.shared_libs]
rule                = "shared_lib_api_surface_is_minimal"
description         = "A shared lib's index.ts exposes only what consumers need. No leaking internals."

# ── 13a Automated NX rules (enforced by coderev treesitter adapter) ─────────
[nx_conventions.no_deep_import]
rule                = "nx_conventions.no_deep_import"
severity            = "major"
applies_to          = ["*.ts", "*.js"]
description         = "Relative import crossing two or more levels (../../) bypasses NX boundary enforcement"
remediation         = "Import via @scope/lib-name public API instead (configure tsconfig paths)."


# ═════════════════════════════════════════════════════════════════════════════
# 14. REVIEW PROCESS
# ═════════════════════════════════════════════════════════════════════════════

[review_process]

[review_process.pr_size]
rule                = "pr_line_limit"
max_lines_changed   = 300   # was 400
advisory_at         = 200
description         = "Large PRs are reviewed superficially. Split by concern — not by file."
remediation         = "Stacked PRs; feature-flag-gated incremental commits; API-first then implementation."

[review_process.pr_description]
rule                = "pr_must_have_structured_description"
required_sections   = ["what", "why", "risk", "how_to_test", "rollback"]
description         = "Risk and rollback sections added vs v1. Client impact needs explicit documentation."

[review_process.approvals]
rule                = "minimum_approvals_by_context"
default_count       = 2
security_sensitive  = 3    # auth, payment, data export, infra
architecture_change = 3    # new service, new external dep, boundary change
hotfix_count        = 2    # no fast-lane — two eyes minimum even under pressure

[review_process.review_sla]
rule                = "review_turnaround_sla"
first_review_hours  = 4
blocking_response_hours = 8
description         = "Slow reviews are a delivery risk. Unanswered PRs block flow."

[review_process.self_merge]
rule                = "author_cannot_approve_own_pr"

[review_process.stale_pr]
rule                = "no_stale_prs"
max_open_days       = 3    # was 5; drift compounds fast
remediation         = "Rebase or close. A PR is a liability, not an asset."

[review_process.ci_must_pass]
rule                = "all_ci_checks_green_before_merge"
no_override_allowed = true
description         = "Bypassing CI ('I'll fix it in the next PR') is never acceptable."


# ═════════════════════════════════════════════════════════════════════════════
# 15. SEVERITY SUMMARY
# ═════════════════════════════════════════════════════════════════════════════

[severity_definitions]

[severity_definitions.blocker]
description         = "CI gate hard-fails. Merge is physically impossible without fix."
categories          = [
"security.*",
"stability.*",
"observability.*",
"hardcoding.environment_values",
"hardcoding.config_validation",
"type_safety.*",
"complexity.*",
"file_structure.*",
"api_contract.*",
"testing.coverage",
"testing.pyramid",
"testing.contract_testing",
"performance.database",
"performance.async",
"deployment_readiness.*",
"nx_conventions.*",
"documentation.no_comment_tombstones",
"review_process.ci_must_pass",
]

[severity_definitions.major]
description         = "Must fix before merge. Reviewer may grant a 24h exception with written justification + linked ticket."
categories          = [
"hardcoding.magic_numbers",
"documentation.public_api",
"documentation.todo_format",
"documentation.adr",
"performance.memory",
"performance.caching",
]

[severity_definitions.advisory]
description         = "Fix or provide written justification in PR thread."
categories          = [
"documentation.comment_quality",
"performance.bundle",
]

[severity_definitions.info]
description         = "Learning note. No action required."
categories          = []


