# ─────────────────────────────────────────────────────────────────────────────
# Tool Adapter Configuration
#
# This file controls which tool handles which rules and how each tool is invoked.
# Swap any adapter by changing its settings here — no Go source changes needed.
# Add your own tools under [[adapters.custom]].
# ─────────────────────────────────────────────────────────────────────────────

# ── Native code graph (`coderev graph`) ───────────────────────────────────────
# Output dir for graph.json + graph.html. A coderev-owned dotdir, NOT
# graphify-out/ (that belongs to the separate graphify tool).
[graph]
output_dir = ".coderev/graph"

[adapters.treesitter]
enabled = true
# Tree-sitter is the primary engine — pure Go, no external binary.
# Handles all structural, complexity, type-safety, and pattern checks.
rules = [
"complexity.*",
"file_structure.file_length",
"file_structure.class_length",
"type_safety.no_any",
"type_safety.null_safety",
"hardcoding.magic_numbers",
"hardcoding.urls_and_paths",
"documentation.comment_quality",
"documentation.no_comment_tombstones",
"documentation.todo_format",
"observability.logging",
"stability.error_handling",
]

# ── Native (pure-Go) adapters — the zero-dependency defaults ──────────────────
# These replace gitleaks/madge/semgrep with no external binary required.

[adapters.depcve]
enabled      = true
snapshot_url = ""
rules        = ["security.dependencies"]

[adapters.secrets]
enabled = true
# Native secret scanner (regex rules + Shannon entropy). No binary.
rules = ["security.secrets"]

[adapters.imports]
enabled = true
# Native import-graph + Tarjan circular-dependency detection. No binary.
rules = ["file_structure.circular_deps", "nx_conventions.boundaries"]

# ── External tools — OPTIONAL enrichment (off by default) ─────────────────────
# The native adapters above already cover these rules. Enable a tool below only
# if you want its extra depth; it then runs additively and findings are deduped.

[adapters.semgrep]
enabled      = false    # native treesitter walkers now cover the owned rules
binary       = "semgrep" # if enabled, must be on $PATH: pip install semgrep
rules        = ["security.injection.*", "security.auth.*", "security.cryptography"]
args         = []       # extra args appended to semgrep invocation
download_url = "https://github.com/semgrep/semgrep/releases/download/v%s/semgrep-v%s-ubuntu-16.04.tgz"

[adapters.gitleaks]
enabled      = false    # native [adapters.secrets] is the default
binary       = "gitleaks" # if enabled: brew install gitleaks
rules        = ["security.secrets"]
args         = []
download_url = "https://github.com/gitleaks/gitleaks/releases/download/v%s/gitleaks_%s_%s_%s.tar.gz"

[adapters.madge]
enabled = false         # native [adapters.imports] is the default
binary  = "madge"       # if enabled: npm install -g madge
rules   = ["file_structure.circular_deps", "nx_conventions.boundaries"]
args    = []

[adapters.npmaudit]
enabled = true
binary  = "npm"         # built into Node.js
rules   = ["security.dependencies"]
args    = []

# ── SARIF output URLs (configuration, not hardcoded constants) ────────────────
[sarif]
schema_url      = "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json"
information_uri = "https://github.com/srivastava-ami/coderev"

# ── Custom adapters ───────────────────────────────────────────────────────────
# Any program that outputs NDJSON (one Finding JSON per line) or a JSON array
# of Findings can plug in here. Use {{target}} as a placeholder for the repo path.
#
# Finding schema (must match internal/analysis/finding.go):
#   { "Rule": "...", "Pillar": "...", "Severity": "blocker|major|advisory|info",
#     "File": "...", "Line": 0, "Message": "...", "Remediation": "..." }
#
# [[adapters.custom]]
# name     = "my-checker"
# binary   = "/usr/local/bin/my-checker"
# enabled  = false
# protocol = "ndjson"
# rules    = ["complexity.*"]
# args     = ["--format=coderev-json", "{{target}}"]
